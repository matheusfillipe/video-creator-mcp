name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run docs:tools
      - run: git diff --exit-code -- docs/TOOLS.md  # fail if tool docs are out of date

  # Build + publish the image only from main or a version tag — never on PRs.
  docker:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable={{is_default_branch}}
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Publish to npm on version tag pushes (v*.*.*) only. Uses npm Trusted Publishing via
  # OIDC — no NPM_TOKEN secret needed; npm verifies the workflow's identity directly.
  # Provenance attestation is attached so consumers can verify the package was built by
  # this exact workflow run (visible as a green badge on npmjs.com).
  npm-publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing + --provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"
      # Trusted Publishing (OIDC → npm auth, no NPM_TOKEN) requires npm >= 11.5.1.
      # Node 22 ships npm 10.9 which can sign provenance but can't exchange the OIDC
      # token for an npm auth token, so PUT to the registry 404s as unauthenticated.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
